<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study 01 · ACE PHQ GAD MSPSS</title>
  <link rel="stylesheet" href="../assets/shared.css" />
  <link rel="stylesheet" href="../sociodem/sociodem.css" />
  <script src="../assets/shared.js"></script>
  <script src="sociodem_study_01.js"></script>
  <script src="export_study_01.js"></script>
</head>

<body>

<div id="site-header"></div>

<main class="page-main">
  <h2 id="step-title"></h2>
  <div id="step-container"></div>
  <div id="nav-container" style="display:none; gap:1rem; margin-top:1rem;"></div>
</main>

<div id="site-footer"></div>

<script>
  // 1. Consent Guard
  if (localStorage.getItem("studyConsent") !== "true") {
    window.location.href = "consent.html";
  }

  let step = 0;

  const steps = [
    { id: 'ace',     title: "બાળપણના પ્રતિકૂળ અનુભવો આંતરરાષ્ટ્રીય પ્રશ્નાવલી" },
    { id: 'phq',     title: "ડિપ્રેશન સ્ક્રીનિંગ · PHQ-9" },
    { id: 'gad',     title: "ચિંતા સ્ક્રીનિંગ · GAD-7" },
    { id: 'mspss',   title: "સામાજિક આધાર · MSPSS" },
    {
      id: 'sociodem',
      title: "સામાજિક માહિતી · Sociodemographic",
      content: `
        <p>આ માહિતી સંશોધન હેતુ માટે છે.</p>
        <div id="sociodem-container"></div>
        <button id="sociodem-submit-btn" class="btn-primary" onclick="submitSociodem()" disabled style="margin-top:1rem;">સબમિટ કરો →</button>
      `
    },
    {
      id: 'results',
      title: "આભાર · Thank You",
      content: `
        <p>તમે સફળતાપૂર્વક બધા સ્ટેપ્સ પૂર્ણ કર્યા છે. તમારો ડેટા સંશોધન માટે સ્ટોર થયો છે.</p>
        <p>આભાર!</p>
      `
    },
  ];

  // Scale steps → local study_01 files
  const scaleFiles = {
    ACE:   'WHO-ACE-IQ-BINARY.html',
    PHQ9:  'PHQ9.html',
    GAD7:  'GAD7.html',
    MSPSS: 'MSPSS.html',
  };

  const scaleStepMap = { ace: 'ACE', phq: 'PHQ9', gad: 'GAD7', mspss: 'MSPSS' };

  const nextStepMap = { ACE: 'phq', PHQ9: 'gad', GAD7: 'mspss', MSPSS: 'sociodem' };

  function startScale(scale) {
    const currentPath = window.location.pathname;
    const nextUrl     = `${currentPath}?next=${nextStepMap[scale]}`;
    window.location.href = `${scaleFiles[scale]}?study=1&next=${encodeURIComponent(nextUrl)}`;
  }

  function checkSociodemComplete() {
    const btn = document.getElementById('sociodem-submit-btn');
    if (btn) btn.disabled = !SocioDem.isComplete();
  }

  async function submitSociodem() {
    const sdData = SocioDem.getData();
    if (!sdData) return;
    await uploadSocioDemData(getToken(), sdData);
    step = steps.findIndex(s => s.id === 'results');
    renderStep();
  }

  function renderStep() {
    const currentStep = steps[step];

    // Auto-navigate for scale steps
    if (scaleStepMap[currentStep.id]) {
      startScale(scaleStepMap[currentStep.id]);
      return;
    }

    document.getElementById("step-title").innerText = currentStep.title;
    document.getElementById("step-container").innerHTML = currentStep.content || '';

    document.getElementById('nav-container').style.display = 'none';

    if (currentStep.id === 'sociodem') {
      SocioDem.reset();
      SocioDem.render('sociodem-container', 'college', 'district');
      document.getElementById('sociodem-container')
        .addEventListener('change', checkSociodemComplete);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const next = new URLSearchParams(window.location.search).get('next');
    if (next) {
      const idx = steps.findIndex(s => s.id === next);
      if (idx !== -1) step = idx;
    }
    renderStep();
  });
</script>
</body>
</html>
