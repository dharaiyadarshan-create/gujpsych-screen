<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study · ACE PHQ GAD MSPSS</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <link rel="stylesheet" href="../sociodem/sociodem.css" />
  <script src="../assets/shared.js"></script>
  <script src="../sociodem/sociodem.js"></script>
  <script src="export.js"></script> 
</head>

<body>

<script>
  // 1. Consent Guard
  if (localStorage.getItem("studyConsent") !== "true") {
    window.location.href = "consent.html"; 
  }

  let step = 0;

  const steps = [
    {
      id: 'ace',
      title: "બાળપણના પ્રતિકૂળ અનુભવો આંતરરાષ્ટ્રીય પ્રશ્નાવલી",
      hasNav: false,
      content: `
        <p>WHO ACE IQ એ 25 પ્રશ્નોની સ્ક્રીનિંગ છે જે બાળપણના પ્રતિકૂળ અનુભવો માપે છે.</p>
        <button class="btn-primary" onclick="startScale('ACE')">સ્ક્રીનિંગ શરૂ કરો →</button>
      `
    },
    {
      id: 'phq',
      title: "ડિપ્રેશન સ્ક્રીનિંગ · PHQ-9",
      hasNav: false,
      content: `
        <p>PHQ-9 એ ૯ પ્રશ્નોની સ્ક્રીનિંગ છે જે ડિપ્રેશનના લક્ષણો માપે છે.</p>
        <button class="btn-primary" onclick="startScale('PHQ9')">સ્ક્રીનિંગ શરૂ કરો →</button>
      `
    },
    {
      id: 'gad',
      title: "ચિંતા સ્ક્રીનિંગ · GAD-7",
      hasNav: false,
      content: `
        <p>GAD-7 એ ૭ પ્રશ્નોની સ્ક્રીનિંગ છે જે ચિંતાના લક્ષણો માપે છે.</p>
        <button class="btn-primary" onclick="startScale('GAD7')">સ્ક્રીનિંગ શરૂ કરો →</button>
      `
    },
    {
      id: 'mspss',
      title: "સામાજિક આધાર · MSPSS",
      hasNav: false,
      content: `
        <p>MSPSS એ ૧૨ પ્રશ્નોની સ્ક્રીનિંગ છે જે સામાજિક આધાર માપે છે.</p>
        <button class="btn-primary" onclick="startScale('MSPSS')">સ્ક્રીનિંગ શરૂ કરો →</button>
      `
    },
    {
      id: 'sociodem',
      title: "સામાજિક માહિતી · Sociodemographic",
      hasNav: false,
      content: `
        <p>આ માહિતી સંશોધન હેતુ માટે છે.</p>
        <button class="btn-primary" onclick="window.location.href='sociodem.html'"> સામાજિક માહિતી ભરો →</button>
      `
    },
    window.location.href = "sociodem.html?from=studies/study-ace-phq-gad-mspss/index.html";
    {
      id: 'results',
      title: "પરિણામ · Results",
      hasNav: false,
      content: `
        <p>તમે સફળતાપૂર્વક બધા સ્ટેપ્સ પૂર્ણ કર્યા છે. તમારો ડેટા સંશોધન માટે સ્ટોર થયો છે.</p>
        <p>આભાર!</p>
      `
    }
  ];

  // 2. Navigation logic
  function startScale(scale) {
    const nextMap = { ACE: 'phq', PHQ9: 'gad', GAD7: 'mspss', MSPSS: 'sociodem' };
    const nextScale = nextMap[scale];
    const currentPath = window.location.pathname;
    const nextUrl = `${currentPath}?next=${nextScale}`;
    
    const scaleUrls = { ACE: 'WHO-ACE-IQ-BINARY', PHQ9: 'PHQ9', GAD7: 'GAD7', MSPSS: 'MSPSS' };
    const targetFile = scaleUrls[scale] || scale;
    
    window.location.href = `../../scales_folder/${targetFile}.html?study=1&next=${encodeURIComponent(nextUrl)}`;
  }

  function checkSociodemComplete() {
    const btn = document.getElementById('sociodem-submit-btn');
    if (btn) btn.disabled = !SocioDem.isComplete();
  }

  // 3. DATA EXPORT LOGIC
  async function submitSociodem() {
    const sdData = SocioDem.getData();
    if (!sdData) return;

    // Use function from export.js
    await uploadSocioDemData(getToken(), sdData);
    
    // Move to final result step
    step = 5; 
    renderStep();
  }

  function renderStep() {
    const currentStep = steps[step];
    document.getElementById("step-title").innerText = currentStep.title;
    document.getElementById("step-container").innerHTML = currentStep.content;

    const nav = document.getElementById('nav-container');
    nav.style.display = currentStep.hasNav ? 'flex' : 'none';

    if (currentStep.id === 'sociodem') {
      SocioDem.reset();
      SocioDem.render('sociodem-container', 'college');
      const container = document.getElementById('sociodem-container');
      container.addEventListener('change', checkSociodemComplete);
    }
  }

  // Initial Load
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next');
    if (next) {
      const stepIndex = steps.findIndex(s => s.id === next);
      if (stepIndex !== -1) {
        step = stepIndex;
      }
    }
    renderStep();
  });



</script>
</body>
</html>
