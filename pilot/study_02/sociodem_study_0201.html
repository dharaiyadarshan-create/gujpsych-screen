<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="સામાજિક માહિતી — GujPsych-Screen"/>
  <title>સામાજિક માહિતી · GujPsych-Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&family=Noto+Serif+Gujarati:wght@400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared_study_0201.css"/>
  <link rel="stylesheet" href="sociodem_study_0201.css"/>
 
  <style>
    /* Ensure the main form is hidden until ID is entered */
    .page-main { display: none; }
    
    #id-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    
    #id-container h3 { margin-top: 0; color: #333; }
    
    #id-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #eee;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    #id-container button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="site-header"></div>

<main class="page-main">
  <div class="screen active" id="screen-sociodem">
    <span class="eyebrow">સામાજિક માહિતી · Sociodemographic</span>
    <h1>તમારા વિશે થોડી માહિતી</h1>
    <p class="lead">
      આ માહિતી સંશોધન હેતુ માટે છે અને આ માહિતી ગોપનીય રહે છે.
    </p>

    <div id="sd-container"></div>

<script src="../assets/shared.js"></script>
<script src="sociodem_study_0201.js"></script>

<script>
  // ── 1. Participant ID Logic ──
  document.getElementById('start-btn').addEventListener('click', () => {
    const p = document.getElementById('phonePart').value;
    const d = document.getElementById('datePart').value;
    
    const result = STUDY.setCode(p + d);

    if (result.ok) {
      document.getElementById('id-container').style.display = 'none';
      document.querySelector('.page-main').style.display = 'block';
    } else {
      alert(result.msg);
    }
  });

  // ── 2. Initialization ──
  const SUBMITTED_KEY = 'study_01_sociodem_submitted';

  document.addEventListener('DOMContentLoaded', () => {
    // Auto-reveal if ID already exists in session
    if (STUDY.getPID()) {
      document.getElementById('id-container').style.display = 'none';
      document.querySelector('.page-main').style.display = 'block';
    }

    SocioDem.reset();
    SocioDem.render('sd-container');

    const sd = document.getElementById('sd-container');
    sd.addEventListener('click', updateButtons);
    sd.addEventListener('input', updateButtons);

    if (sessionStorage.getItem(SUBMITTED_KEY) === '1') {
      lockAfterSubmit();
    }
  });

  function updateButtons() {
    setTimeout(() => {
      const isComplete = SocioDem.isComplete();
      const isSubmitted = sessionStorage.getItem(SUBMITTED_KEY) === '1';
      document.getElementById('submit-btn').disabled = !isComplete || isSubmitted;
    }, 50);
  }

  // ── 3. Submit & Move to First Scale ──
  async function handleSubmit() {
    const data = SocioDem.getData();
    if (!data) return;

    showScreen('screen-submitting');

    STUDY.saveData('sociodemo', data);
    sessionStorage.setItem(SUBMITTED_KEY, '1');

    try {
      const payload = STUDY.buildExport(1);
      STUDY.submitToSheets(payload);
    } catch (err) {
      console.error('Submission failed:', err);
    }

    // Direct transition to the first scale
    window.location.href = 'GHSQ.html';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const t = document.getElementById(id);
    if (t) t.classList.add('active');
    window.scrollTo(0, 0);
  }

  function goBack() {
    location.reload();
  }
</script>

<div id="site-footer"></div>
</body>
</html>
